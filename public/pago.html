<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appmin - Información de tu pago</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Appmin</h1>
        <h2>Información de tu pago</h2>
        <p>Por los mejores métodos de pago</p>
    </header>

    <main>
        <form id="formularioPago">
            <div>
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" required>
            </div>
            <div>
                <label for="cantidad">Cantidad a Pagar ($):</label>
                <input type="number" id="cantidad" required>
            </div>
            <div>
                <label for="metodo">Método de Pago:</label>
                <select id="metodo" required>
                    <option value="">Selecciona</option>
                    <option value="PSE">PSE (Simulado)</option>
                    <option value="Tarjeta">Tarjeta de Crédito (Simulado)</option>
                </select>
            </div>
            <div>
                <label for="idResidente">Residente (Prueba):</label>
                <input type="number" id="idResidente" required>
            </div>
            <div>
                <label for="idConjunto">Conjunto (Prueba):</label>
                <input type="number" id="idConjunto" required>
            </div>

            <button type="submit" style="background-color: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 15px;">
                💳 Proceder al Pago Seguro
            </button>
        </form> 

        <p id="mensajeRespuesta" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>
    </main>

    <footer>
        <p>Tu Appmin</p>
    </footer>
</body>
</html>
