<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appmin - Información de tu pago</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* Fondo amarillo exclusivo de esta página */
        body {
            background-color: var(--color-boton-amarillo);
        }
        /* Header transparente sobre fondo amarillo */
        header {
            background-color: transparent;
            padding: 20px;
        }
        header h1 {
            color: white;
        }
        /* "Tu Appmin" como botón oscuro en la esquina */
        header a {
            background-color: var(--color-texto-negro);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            top: 16px;
        }
        header a:hover {
            border-bottom: none;
            opacity: 0.85;
        }
        /* Centra la tarjeta en el main */
        main {
            display: flex;
            justify-content: center;
            padding: 10px 20px 40px 20px;
        }
        /* Tarjeta blanca con el formulario */
        .pago-tarjeta {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            width: 95%;
            max-width: 1400px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }
        .pago-tarjeta h2 {
            font-size: 22px;
            font-weight: 800;
            text-align: left;
            margin: 0 0 4px 0;
        }
        .pago-tarjeta .subtitulo {
            color: #999;
            font-size: 13px;
            margin: 0 0 24px 0;
            text-align: left;
        }
        .pago-tarjeta form {
            margin-top: 0;
        }
        /* Fila de checkbox + texto de términos */
        .terminos {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 16px 0 4px 0;
            font-size: 13px;
        }
        .terminos input[type="checkbox"] {
            margin-top: 2px;
            flex-shrink: 0;
        }
        .terminos label {
            font-weight: normal;
            margin-bottom: 0;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="appPago">
        <header>
            <h1>Appmin</h1>
            <a href="login.html">Tu Appmin</a>
        </header>

        <main>
            <div class="pago-tarjeta">

                <!-- ====== FORMULARIO: idle o error ====== -->
                <template v-if="estado === 'idle' || estado === 'error'">
                    <h2>Información &nbsp;de tu pago</h2>
                    <p class="subtitulo">Por los mejores métodos de pago</p>

                    <form @submit.prevent="manejarPago">
                        <div>
                            <label for="nombre">Nombre completo</label>
                            <input type="text" id="nombre" v-model="form.nombre"
                                   placeholder="Nombre" required>
                        </div>
                        <div>
                            <label for="conjunto">Conjunto Residencial</label>
                            <select id="conjunto" v-model.number="form.idConjunto" required>
                                <option value="">Selecciona</option>
                                <option v-for="c in conjuntos" :key="c.codigo_conjunto" :value="c.codigo_conjunto">
                                    {{ c.nombre_conjunto }}
                                </option>
                            </select>
                        </div>
                        <div>
                            <label for="cantidad">Cantidad a Pagar ($)</label>
                            <input type="number" id="cantidad" v-model.number="form.cantidad"
                                   placeholder="Monto" required>
                        </div>
                        <div>
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" v-model="form.telefono"
                                   placeholder="Número">
                        </div>
                        <div>
                            <label for="correo">Correo</label>
                            <input type="email" id="correo" v-model="form.correo"
                                   placeholder="correo@ejemplo.com">
                        </div>
                        <div>
                            <label for="metodo">Método de Pago</label>
                            <select id="metodo" v-model="form.metodo" required>
                                <option value="">Selecciona</option>
                                <option value="PSE">PSE (Simulado)</option>
                                <option value="Tarjeta">Tarjeta de Crédito (Simulado)</option>
                            </select>
                        </div>

                        <div class="terminos">
                            <input type="checkbox" id="terminos" v-model="form.aceptaTerminos" required>
                            <label for="terminos">
                                No soy un robot.
                                <a href="#">Lee nuestros términos y condiciones</a>
                            </label>
                        </div>

                        <p v-if="estado === 'error'"
                           style="color: red; font-weight: bold; font-size: 13px; margin: 8px 0 0 0;">
                            {{ mensajeError }}
                        </p>

                        <!-- Botón secundario (oscuro) para contrastar con la tarjeta blanca -->
                        <button type="submit" class="secundario" :disabled="estado === 'procesando'">
                            Proceder al Pago
                        </button>
                    </form>
                </template>

                <!-- ====== PROCESANDO ====== -->
                <div v-if="estado === 'procesando'" style="text-align: center; padding: 40px 0;">
                    <p style="color: #3498db; font-weight: bold; font-size: 18px;">
                        ⏳ Procesando tu solicitud...
                    </p>
                </div>


            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: {
                        nombre: '',
                        cantidad: null,
                        metodo: '',
                        telefono: '',
                        correo: '',
                        idConjunto: null,
                        aceptaTerminos: false
                    },
                    estado: 'idle',
                    mensajeError: '',
                    conjuntos: []
                };
            },
            async mounted() {
                // Carga los conjuntos reales desde la BD para el dropdown
                try {
                    const res = await fetch('/api/conjuntos');
                    this.conjuntos = await res.json();
                } catch (e) {
                    console.error('No se pudieron cargar los conjuntos:', e);
                }
            },
            methods: {
                async manejarPago() {
                    if (!this.form.cantidad || this.form.cantidad <= 0) {
                        this.estado = 'error';
                        this.mensajeError = 'Por favor ingresa un monto válido.';
                        return;
                    }
                    this.estado = 'procesando';
                    try {
                        const respuesta = await fetch('/api/pagos', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nombrePago: this.form.nombre,
                                cantidadPago: this.form.cantidad,
                                metodoPago: this.form.metodo + ' (Simulado)',
                                idResidente: 1,
                                codigoConjunto: this.form.idConjunto
                            })
                        });
                        if (respuesta.ok) {
                            const resultado = await respuesta.json();
                            // Guarda los datos del pago para mostrarlos en exito.html
                            const conjuntoSeleccionado = this.conjuntos.find(c => c.codigo_conjunto === this.form.idConjunto);
                            sessionStorage.setItem('pagoExito', JSON.stringify({
                                nombre:   this.form.nombre,
                                conjunto: conjuntoSeleccionado ? conjuntoSeleccionado.nombre_conjunto : '—',
                                telefono: this.form.telefono,
                                metodo:   this.form.metodo,
                                idPago:   resultado.idPago
                            }));
                            window.location.href = 'exito.html';
                        } else {
                            const resultado = await respuesta.json();
                            this.estado = 'error';
                            this.mensajeError = 'Error en el sistema: ' + resultado.mensaje;
                        }
                    } catch (error) {
                        this.estado = 'error';
                        this.mensajeError = 'Error de comunicación. Verifica que el servidor esté corriendo.';
                    }
                }
            }
        }).mount('#appPago');
    </script>
</body>
</html>
