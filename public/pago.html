<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appmin - Información de tu pago</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Vue 3 cargado desde CDN. No requiere instalación ni proceso de compilación.
         Expone el objeto global "Vue" que usamos abajo con createApp(). -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <header>
        <h1>Appmin</h1>
        <h2>Información de tu pago</h2>
        <p>Por los mejores métodos de pago</p>
    </header>

    <!-- id="appPago" aqui se hace el montaje de datos: Vue toma control de todo lo que está
         dentro de este elemento y puede leer/modificar el contenido -->
    <main id="appPago">

        <!-- v-if: Vue muestra u oculta este bloque según el valor de "estado".
             mientras no haya errores (para que pueda corregir y reintentar). -->
        <form v-if="estado === 'idle' || estado === 'error'" @submit.prevent="manejarPago">

            <!-- v-model crea un enlace bidireccional entre el input y la propiedad
                 del objeto "form" en Vue. Reemplaza los document.getElementById()
                 que se usaban antes para leer cada campo al momento del envío. -->
            <div>
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" v-model="form.nombre" required>
            </div>
            <div>
                <label for="cantidad">Cantidad a Pagar ($):</label>
                <!-- .number convierte el valor del input string a número
                     automáticamente, evitando errores en el backend. -->
                <input type="number" id="cantidad" v-model.number="form.cantidad" required>
            </div>
            <div>
                <label for="metodo">Método de Pago:</label>
                <select id="metodo" v-model="form.metodo" required>
                    <option value="">Selecciona</option>
                    <option value="PSE">PSE (Simulado)</option>
                    <option value="Tarjeta">Tarjeta de Crédito (Simulado)</option>
                </select>
            </div>
            <div>
                <label for="idResidente">Residente (Prueba):</label>
                <input type="number" id="idResidente" v-model.number="form.idResidente" required>
            </div>
            <div>
                <label for="idConjunto">Conjunto (Prueba):</label>
                <input type="number" id="idConjunto" v-model.number="form.idConjunto" required>
            </div>

            <!-- El mensaje de error se muestra dentro del formulario para que el
                 usuario lo vea sin tener que buscar en otra parte de la página. -->
            <p v-if="estado === 'error'" style="color: red; font-weight: bold; margin-top: 10px;">
                {{ mensajeError }}
            </p>

            <button type="submit" style="background-color: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 15px;">
                💳 Proceder al Pago Seguro
            </button>
        </form>

        <!-- Estado "procesando": se muestra mientras fetch espera respuesta del servidor.
             Reemplaza el texto que antes se inyectaba manualmente con mensajeRespuesta.textContent. -->
        <div v-if="estado === 'procesando'" style="text-align: center; padding: 40px;">
            <p style="color: #3498db; font-weight: bold; font-size: 18px;">
                ⏳ Procesando tu solicitud en la base de datos...
            </p>
        </div>

        <!-- Nuevo exito,  reemplaza la redirección a exito.html que existía antes.
             Muestra un resumen del pago usando los datos que ya están en "form",
             sin pasarlos por URL ni localStorage. -->
        <div v-if="estado === 'exito'" style="text-align: center;">
            <p style="color: #2ecc71; font-weight: bold; font-size: 20px; margin-bottom: 20px;">
                ✅ ¡Pago registrado con éxito!
            </p>
            <section class="resumen-pago">
                <!-- Interpolación Vue: {{ }} muestra el valor reactivo directamente en el HTML. -->
                <p><strong>Nombre:</strong> {{ form.nombre }}</p>
                <p><strong>Cantidad:</strong> ${{ form.cantidad }}</p>
                <p><strong>Método:</strong> {{ form.metodo }}</p>
            </section>
            <a href="index.html">
                <button type="button" style="margin-top: 20px;">Volver al inicio</button>
            </a>
        </div>

    </main>

    <footer>
        <p>Tu Appmin</p>
    </footer>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    // "form" centraliza todos los campos del formulario en un solo objeto.
                    // Antes se leían con 5 llamadas a document.getElementById() al enviar.
                    form: {
                        nombre: '',
                        cantidad: null,
                        metodo: '',
                        idResidente: null,
                        idConjunto: null
                    },
                    // "estado" es la máquina de estados del formulario. Un solo valor
                    // controla qué bloque visual se muestra en pantalla:
                    // idle -> formulario vacío listo para llenar
                    // tendremos diferentes mensajes de esto como: procesando, exito, error
                    estado: 'idle',
                    mensajeError: ''
                };
            },
            methods: {
                async manejarPago() {
                    // Validación de datos para que el form no se mande vacio
                    if (!this.form.cantidad || this.form.cantidad <= 0) {
                        this.estado = 'error';
                        this.mensajeError = 'Por favor ingresa un monto válido.';
                        return;
                    }

                    // Cambia el estado a procesando y lo refleja
                    this.estado = 'procesando';

                    try {
                        // fetch manda al backend Express como JSOn
                        // Los nombres de propiedades deben coincidir con los que
                        // server.js extrae en req.body (nombrePago, cantidadPago, etc.)
                        const respuesta = await fetch('/api/pagos', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                nombrePago: this.form.nombre,
                                cantidadPago: this.form.cantidad,
                                metodoPago: this.form.metodo + ' (Simulado)',
                                idResidente: this.form.idResidente,
                                codigoConjunto: this.form.idConjunto
                            })
                        });

                        if (respuesta.ok) {
                            // El pago se guardó en MySQL. Vue cambia el estado a "exito"
                            // y muestra el resumen sin necesidad de redirigir a otra página.
                            this.estado = 'exito';
                        } else {
                            const resultado = await respuesta.json();
                            this.estado = 'error';
                            this.mensajeError = 'Error en el sistema: ' + resultado.mensaje;
                        }
                    } catch (error) {
                        // Este catch atrapa errores de red (servidor caído, sin conexión)
                        this.estado = 'error';
                        this.mensajeError = 'Error de comunicación. Verifica que el servidor esté corriendo.';
                    }
                }
            }
        }).mount('#appPago'); // Conecta la instancia Vue al elemento <main id="appPago">
    </script>
</body>
</html>
