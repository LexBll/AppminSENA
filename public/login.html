<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appmin - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Vue 3 CDN: controla tanto el formulario de login como el de registro -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="appLogin">
    <header>
        <h1>Appmin</h1>
        <!-- El título cambia reactivamente según la vista activa -->
        <h2>{{ vista === 'login' ? 'Inicia sesión' : 'Crear cuenta de administrador' }}</h2>
    </header>

    <main>

        <!-- ==================== VISTA: LOGIN ==================== -->
        <!-- v-if="vista === 'login'": solo visible cuando la vista activa es login -->
        <form v-if="vista === 'login'" @submit.prevent="iniciarSesion">
            <div>
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" v-model="formLogin.usuario" required>
            </div>
            <div>
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" v-model="formLogin.contrasena" required>
            </div>

            <button type="submit" :disabled="estadoLogin === 'cargando'">
                {{ estadoLogin === 'cargando' ? 'Verificando...' : 'Ingresar' }}
            </button>
        </form>

        <!-- Mensajes de respuesta del login -->
        <p v-if="estadoLogin === 'error'"
           style="color: red; text-align: center; font-weight: bold; margin-top: 15px;">
            {{ mensajeLogin }}
        </p>
        <p v-if="estadoLogin === 'exito'"
           style="color: #2ecc71; text-align: center; font-weight: bold; margin-top: 15px;">
            Acceso concedido. Redirigiendo...
        </p>

        <!-- Enlace para cambiar a la vista de registro.
             @click.prevent cambia "vista" sin recargar la página. -->
        <p v-if="vista === 'login'" style="text-align: center; margin-top: 20px; font-size: 14px;">
            ¿No estás registrado?
            <a href="#" @click.prevent="cambiarVista('registro')" style="font-weight: bold;">
                Crear cuenta
            </a>
        </p>


        <!-- ==================== VISTA: REGISTRO ==================== -->
        <!-- v-if="vista === 'registro'": solo visible cuando se activa desde el enlace -->
        <form v-if="vista === 'registro'" @submit.prevent="registrarAdmin">
            <div>
                <label for="nombres">Nombres:</label>
                <input type="text" id="nombres" v-model="formRegistro.nombres" required>
            </div>
            <div>
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" v-model="formRegistro.apellidos" required>
            </div>
            <div>
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" v-model="formRegistro.telefono" required>
            </div>
            <div>
                <label for="nombreConjunto">Nombre de tu Conjunto <span style="font-weight:normal;color:#999;">(opcional)</span>:</label>
                <input type="text" id="nombreConjunto" v-model="formRegistro.nombreConjunto"
                       placeholder="Ej: Conjunto Los Andes">
            </div>
            <div>
                <label for="usuarioReg">Usuario:</label>
                <input type="text" id="usuarioReg" v-model="formRegistro.usuario" required>
            </div>
            <div>
                <label for="contrasenaReg">Contraseña:</label>
                <input type="password" id="contrasenaReg" v-model="formRegistro.contrasena" required>
            </div>

            <button type="submit" :disabled="estadoRegistro === 'cargando'">
                {{ estadoRegistro === 'cargando' ? 'Creando cuenta...' : 'Registrarme' }}
            </button>
        </form>

        <!-- Mensajes de respuesta del registro -->
        <p v-if="estadoRegistro === 'error'"
           style="color: red; text-align: center; font-weight: bold; margin-top: 15px;">
            {{ mensajeRegistro }}
        </p>
        <p v-if="estadoRegistro === 'exito'"
           style="color: #2ecc71; text-align: center; font-weight: bold; margin-top: 15px;">
            {{ mensajeRegistro }}
        </p>

        <!-- Enlace para volver al login -->
        <p v-if="vista === 'registro'" style="text-align: center; margin-top: 20px; font-size: 14px;">
            ¿Ya tienes cuenta?
            <a href="#" @click.prevent="cambiarVista('login')" style="font-weight: bold;">
                Iniciar sesión
            </a>
        </p>

    </main>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    // "vista" controla qué formulario se muestra.
                    // Cambia entre 'login' y 'registro' sin recargar la página.
                    vista: 'login',

                    // Formulario y estado del login
                    formLogin: { usuario: '', contrasena: '' },
                    estadoLogin: 'idle', // 'idle' | 'cargando' | 'exito' | 'error'
                    mensajeLogin: '',

                    // Formulario y estado del registro
                    formRegistro: {
                        nombres: '',
                        apellidos: '',
                        telefono: '',
                        nombreConjunto: '',
                        usuario: '',
                        contrasena: ''
                    },
                    estadoRegistro: 'idle', // 'idle' | 'cargando' | 'exito' | 'error'
                    mensajeRegistro: ''
                };
            },
            methods: {
                // Cambia entre vistas y limpia los estados de los formularios
                cambiarVista(nuevaVista) {
                    this.vista = nuevaVista;
                    this.estadoLogin = 'idle';
                    this.estadoRegistro = 'idle';
                    this.mensajeLogin = '';
                    this.mensajeRegistro = '';
                },

                async iniciarSesion() {
                    this.estadoLogin = 'cargando';
                    this.mensajeLogin = '';

                    try {
                        // El servidor compara la contraseña con el hash bcrypt en MySQL
                        const respuesta = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.formLogin)
                        });

                        const resultado = await respuesta.json();

                        if (respuesta.ok) {
                            // Guarda el JWT y nombre en localStorage para el dashboard
                            localStorage.setItem('token', resultado.token);
                            localStorage.setItem('nombreAdmin', resultado.nombreAdmin);
                            this.estadoLogin = 'exito';
                            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                        } else {
                            this.estadoLogin = 'error';
                            this.mensajeLogin = resultado.mensaje;
                        }
                    } catch (error) {
                        this.estadoLogin = 'error';
                        this.mensajeLogin = 'Error de conexión con el servidor.';
                    }
                },

                async registrarAdmin() {
                    this.estadoRegistro = 'cargando';
                    this.mensajeRegistro = '';

                    try {
                        // Envía los datos al endpoint /api/auth/registro.
                        // El servidor hashea la contraseña con bcrypt antes de guardarla.
                        const respuesta = await fetch('/api/auth/registro', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.formRegistro)
                        });

                        const resultado = await respuesta.json();

                        if (respuesta.ok) {
                            this.estadoRegistro = 'exito';
                            this.mensajeRegistro = '✅ Cuenta creada. Ahora puedes iniciar sesión.';
                            // Vuelve al login automáticamente después de 2 segundos
                            setTimeout(() => this.cambiarVista('login'), 2000);
                        } else {
                            this.estadoRegistro = 'error';
                            this.mensajeRegistro = resultado.mensaje;
                        }
                    } catch (error) {
                        this.estadoRegistro = 'error';
                        this.mensajeRegistro = 'Error de conexión con el servidor.';
                    }
                }
            }
        }).mount('#appLogin');
    </script>
</body>
</html>
